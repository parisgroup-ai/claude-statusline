name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

env:
  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@parisgroup-ai'

      - name: Install bash tooling
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck jq

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Semantic Release
        run: npx --yes -p semantic-release semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ env.NODE_AUTH_TOKEN }}
