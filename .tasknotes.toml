# tasknotes-cli (tn) project config.
# Schema: rust/crates/tasknotes-core/src/config.rs (tn >= 0.2.0).

tasks_dir   = "docs/TaskNotes/Tasks"
sprint_file = "docs/TaskNotes/sprint.md"
archive_dir = "docs/TaskNotes/Tasks/archive"

[defaults]
task_type     = "TASK"
priority      = "normal"
required_tags = ["task"]

[id]
padding = 3

# Lifecycle sync: `tn start` / `tn done` reflect onto linked GH issues via
# the `Closes GH #N` / `Refs GH #N` convention. Set TN_GH_SYNC=0 to opt out
# for one invocation.
[github]
sync = true
